name: Build Metrolist Neo

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      # ── 1. Checkout (this repo — contains our scripts) ────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Environment ────────────────────────────────────────
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python deps
        run: pip install Pillow --break-system-packages || pip install Pillow

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      # ── 3. Check for new upstream release ─────────────────────
      - name: Check Updates
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/check-updates.sh

      # ── 4. Fetch upstream source at the detected tag ──────────
      - name: Fetch Source
        if: steps.check.outputs.trigger == 'true'
        run: bash .github/scripts/fetch-source.sh "${{ steps.check.outputs.tag }}"

      # ── 5. Patch source (Python — no shell escaping issues) ───
      - name: Apply Modifications
        if: steps.check.outputs.trigger == 'true'
        run: python3 .github/scripts/modify.py

      # ── 6. Build ──────────────────────────────────────────────
      - name: Build APK
        if: steps.check.outputs.trigger == 'true'
        env:
          GITHUB_EVENT_NAME: pull_request
          LASTFM_API_KEY: "dummy"
          LASTFM_SECRET: "dummy"
        run: bash .github/scripts/build.sh

      # ── 7. Sign ───────────────────────────────────────────────
      - name: Collect APKs
        if: steps.check.outputs.trigger == 'true'
        run: bash .github/scripts/collect-apks.sh

      - name: Sign APK
        if: steps.check.outputs.trigger == 'true'
        uses: ilharp/sign-android-release@v1
        id: sign
        with:
          releaseDir: output_apks
          signingKey: ${{ secrets.SIGNING_KEY }}
          keyAlias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: "34.0.0"

      - name: Finalize Artifacts
        if: steps.check.outputs.trigger == 'true'
        run: bash .github/scripts/finalize-apks.sh

      # ── 8. Release ────────────────────────────────────────────
      - name: Create Release
        if: steps.check.outputs.trigger == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check.outputs.tag }}
          name: ${{ steps.check.outputs.tag }}
          body: |
            ### Metrolist Neo
            Automated build from upstream tag: ${{ steps.check.outputs.tag }}

            Original: https://github.com/mostafaalagamy/Metrolist/releases/tag/${{ steps.check.outputs.tag }}
          files: output_apks/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
