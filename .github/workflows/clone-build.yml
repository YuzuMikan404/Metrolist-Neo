name: Build Metrolist Neo

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    # ── クローン固有の設定 ──────────────────────────────────────
    # アプリ名・パッケージ名はここで一元管理する。
    # modify.py は XML を直接書き換えず、build.gradle.kts の
    # resValue / applicationId 仕組みに委ねる。
    env:
      CLONE_APP_NAME:       "Metrolist Neo"
      CLONE_APPLICATION_ID: "com.metrolist.clone"

    steps:
      # ── 1. Checkout ───────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Environment ────────────────────────────────────────
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python deps
        run: pip install Pillow --break-system-packages || pip install Pillow

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      # ── 3. Check for new upstream release ─────────────────────
      - name: Check Updates
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/check-updates.sh

      # ── 4. Fetch upstream source at the detected tag ──────────
      - name: Fetch Source
        if: steps.check.outputs.trigger == 'true'
        run: bash scripts/fetch-source.sh "${{ steps.check.outputs.tag }}"

      # ── 5. Patch source ───────────────────────────────────────
      # modify.py がやること:
      #   - app_name.xml の削除（resValue との重複防止）
      #   - アイコン色変更
      #   - MessageCodec.kt の修正（proto → kotlinx.serialization）
      #   - gradle.properties の CI 最適化
      #
      # やらないこと（環境変数で制御するため）:
      #   - アプリ名の XML 書き換え → METROLIST_APP_NAME で制御
      #   - applicationId の書き換え → METROLIST_APPLICATION_ID で制御
      - name: Apply Modifications
        if: steps.check.outputs.trigger == 'true'
        run: python3 scripts/modify.py

      # ── 6. Build ──────────────────────────────────────────────
      # METROLIST_APP_NAME / METROLIST_APPLICATION_ID を渡すことで
      # build.gradle.kts の resValue / applicationId が上書きされる。
      # LASTFM キーは secrets から取得し、未設定時はダミー値にフォールバック。
      - name: Build APK
        if: steps.check.outputs.trigger == 'true'
        env:
          METROLIST_APP_NAME:       ${{ env.CLONE_APP_NAME }}
          METROLIST_APPLICATION_ID: ${{ env.CLONE_APPLICATION_ID }}
          LASTFM_API_KEY:           ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET:            ${{ secrets.LASTFM_SECRET }}
        run: |
          : "${LASTFM_API_KEY:=dummy_key}"
          : "${LASTFM_SECRET:=dummy_secret}"
          export LASTFM_API_KEY LASTFM_SECRET
          bash scripts/build.sh

      # ── 7. Collect ────────────────────────────────────────────
      - name: Collect APKs
        if: steps.check.outputs.trigger == 'true'
        run: bash scripts/collect-apks.sh

      # ── 8. Sign ───────────────────────────────────────────────
      - name: Sign APK
        if: steps.check.outputs.trigger == 'true'
        uses: ilharp/sign-android-release@v1
        id: sign
        with:
          releaseDir: output_apks
          signingKey:        ${{ secrets.SIGNING_KEY }}
          keyAlias:          ${{ secrets.ALIAS }}
          keyStorePassword:  ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword:       ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: "34.0.0"

      - name: Finalize Artifacts
        if: steps.check.outputs.trigger == 'true'
        run: bash scripts/finalize-apks.sh

      # ── 9. Release ────────────────────────────────────────────
      - name: Create Release
        if: steps.check.outputs.trigger == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check.outputs.tag }}
          name:     ${{ steps.check.outputs.tag }}
          body: |
            ### ${{ env.CLONE_APP_NAME }}
            Automated build from upstream tag: ${{ steps.check.outputs.tag }}

            Original: https://github.com/mostafaalagamy/Metrolist/releases/tag/${{ steps.check.outputs.tag }}
          files: output_apks/*.apk
          draft:      false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
